<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRO - Issues Reporting Outlet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>IRO - Issues Reporting Outlet</h1>
    <p>Report issues affecting AAUA students and Akungba communities.</p>
</header>

<div class="container">

    <form id="issueForm">

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Category</label>
        <select id="category">
            <option>Student</option>
            <option>Indigene</option>
        </select>

        <label>Issue Type</label>
        <select id="issue">
            <option>Security</option>
            <option>Electricity</option>
            <option>Water</option>
            <option>Road</option>
            <option>Accommodation</option>
            <option>Others</option>
        </select>

        <label>Description</label>
        <textarea id="description" rows="5"></textarea>

        <button type="button" onclick="submitIssue()">Submit Report</button>
        <button type="reset">Reset</button>

    </form>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
